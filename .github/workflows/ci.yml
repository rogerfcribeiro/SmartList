name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Dummy env vars for gates that don't call external services.
# Upstash and Resend are mocked in unit/integration tests.
# For real deployments, Vercel pulls the actual secrets via `vercel pull`.
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  AUTH_SECRET: ci-auth-secret-minimum-32-characters-padding
  PASSWORD_RESET_SECRET: ci-reset-secret-minimum-32-chars-padding
  EMAIL_FROM: ci@example.com
  RESEND_API_KEY: re_ci_dummy
  UPSTASH_REDIS_REST_URL: https://ci.upstash.io
  UPSTASH_REDIS_REST_TOKEN: ci_token
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm test

  test-int:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:int

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  # ── Vercel deployments ────────────────────────────────────────────────────
  # Requires three GitHub repository secrets:
  #   VERCEL_TOKEN      — create at vercel.com/account/tokens
  #   VERCEL_ORG_ID     — from .vercel/project.json after `vercel link`
  #   VERCEL_PROJECT_ID — from .vercel/project.json after `vercel link`
  # ─────────────────────────────────────────────────────────────────────────

  deploy-preview:
    name: Deploy (Preview)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, test-int, build]
    if: github.event_name == 'pull_request'
    environment: preview
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: echo "url=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔍 Preview: ${{ steps.deploy.outputs.url }}`
            })

  deploy-production:
    name: Deploy (Production)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, test-int, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
